########################
### Default programs ###
########################

$terminal = wezterm
$fileManager = nautilus
$menu = wofi --show drun
$browser = zen-browser

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

### Application binds ###
bind = $mainMod Mod1, t, exec, $terminal
bind = $mainMod Mod1, s, exec, $browser
bind = $mainMod Mod1, r, exec, $fileManager

### Utility ###
bind = $mainMod Control_R, m, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, r, exec, $menu
bind = $mainMod Mod1, apostrophe, exec, ~/.config/hypr/scripts/waybar_launch.sh &

### Screenshots ###
bind = $mainMod Mod1, slash, exec, hyprshot -m window -o ~/Pictures/Screenshots/
bind = $mainMod Mod1, period, exec, hyprshot -m region -o ~/Pictures/Screenshots/
bind = $mainMod Mod1, comma, exec, hyprshot -m output -o ~/Pictures/Screenshots/

### Window binds ###
bind = $mainMod, c, killactive,
bind = $mainMod, d, fullscreen
bind = $mainMod, v, togglefloating,

### Move window focus ###
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

### Switch to workspace N ###
bind = $mainMod, q, workspace, 1
bind = $mainMod, w, workspace, 2
bind = $mainMod, f, workspace, 3
bind = $mainMod, p, workspace, 4
bind = $mainMod, b, workspace, 5
bind = $mainMod, j, workspace, 6
bind = $mainMod, l, workspace, 7
bind = $mainMod, u, workspace, 8
bind = $mainMod, y, workspace, 9
bind = $mainMod, semicolon, workspace, 10

### Move active window to workspace N ###
bind = $mainMod Control_R, q, movetoworkspace, 1
bind = $mainMod Control_R, w, movetoworkspace, 2
bind = $mainMod Control_R, f, movetoworkspace, 3
bind = $mainMod Control_R, p, movetoworkspace, 4
bind = $mainMod Control_R, b, movetoworkspace, 5
bind = $mainMod Control_R, j, movetoworkspace, 6
bind = $mainMod Control_R, l, movetoworkspace, 7
bind = $mainMod Control_R, u, movetoworkspace, 8
bind = $mainMod Control_R, y, movetoworkspace, 9
bind = $mainMod Control_R, semicolon, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, s, togglespecialworkspace, magic
bind = $mainMod Control_R, s, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mouse and mainMod (lClick: grab window, rClick: resize window)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
